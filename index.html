
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Particle System 💀</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#info {
 position:absolute;
 top:10px;
 left:10px;
 color:white;
 font-family:Arial;
}
</style>
</head>
<body>

<div id="info">Show your hand 💀</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// THREE JS
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 5;

// particles
let particles = [];
let geometry = new THREE.BufferGeometry();
let positions = new Float32Array(3000);

for(let i=0;i<1000;i++){
 positions[i*3] = (Math.random()-0.5)*10;
 positions[i*3+1] = (Math.random()-0.5)*10;
 positions[i*3+2] = (Math.random()-0.5)*10;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

let material = new THREE.PointsMaterial({ color:0x00ffff, size:0.05 });
let points = new THREE.Points(geometry, material);
scene.add(points);

// HAND TRACKING
let handX = 0;
let handY = 0;

const hands = new Hands({
 locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
 maxNumHands:1,
 modelComplexity:1,
 minDetectionConfidence:0.7,
 minTrackingConfidence:0.7
});

hands.onResults(results=>{
 if(results.multiHandLandmarks.length > 0){
   let lm = results.multiHandLandmarks[0][8]; // index finger
   handX = (lm.x - 0.5)*10;
   handY = -(lm.y - 0.5)*10;
 }
});

// camera feed
const video = document.createElement('video');

const cam = new Camera(video,{
 onFrame: async ()=>{
   await hands.send({image: video});
 },
 width:640,
 height:480
});
cam.start();

// animation
function animate(){
 requestAnimationFrame(animate);

 let pos = geometry.attributes.position.array;

 for(let i=0;i<1000;i++){
   let ix = i*3;

   let dx = handX - pos[ix];
   let dy = handY - pos[ix+1];

   pos[ix] += dx * 0.01;
   pos[ix+1] += dy * 0.01;

   // color shift
   material.color.setHSL((i/1000 + Date.now()*0.0001)%1,1,0.5);
 }

 geometry.attributes.position.needsUpdate = true;

 renderer.render(scene,camera);
}

animate();
</script>

</body>
</html>
